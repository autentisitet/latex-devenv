name: LtxEngine CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]  # Trigger Release
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:



env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true



jobs:
  # ------------------------------------------
  # --- Task 1: Linux Compilation and Script Auditing ---
  # ------------------------------------------
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Cache TeX Live
        uses: actions/cache@v4
        with:
          path: ~/texlive
          key: ${{ runner.os }}-texlive-${{ hashFiles('installer.sh', 'template/**/main.tex') }}
          restore-keys: |
            ${{ runner.os }}-texlive-


      - name: Setup LaTeX Environment (Linux)
        run: |
          chmod +x ./installer.sh
          ./installer.sh


      - name: Execute Build Engine (.sh)
        run: |
          chmod +x ./ltx-build.sh
          declare -a templates=(
            "template/lab-report-template/main.tex"
            "template/paper-slides-template/main.tex"
            "template/ppt-template/main.tex"
          )

          for template in "${templates[@]}"; do
            echo "::group::Building $template"
            ./ltx-build.sh "$template" --clean
            echo "::endgroup::"
          done


      - name: Archive Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdf-assets-linux
          path: "**/*.pdf"
          if-no-files-found: error


  # ------------------------------------------
  # --- Task 2: Windows Environment Script Verification ---
  # ------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Cache Scoop Packages
        uses: actions/cache@v4
        with:
          path: |
            C:\Users\runneradmin\scoop
            ~/.scoop
          key: ${{ runner.os }}-scoop-${{ hashFiles('installer.ps1') }}
          restore-keys: |
            ${{ runner.os }}-scoop-


      - name: Cache MiKTeX Data
        uses: actions/cache@v4
        with:
          path: |
            C:\Users\runneradmin\AppData\Local\MiKTeX
            C:\Users\runneradmin\AppData\Roaming\MiKTeX
          key: ${{ runner.os }}-miktex-data-${{ hashFiles('installer.ps1', 'template/**/main.tex') }}
          restore-keys: |
            ${{ runner.os }}-miktex-data-


      - name: Setup LaTeX Environment (Windows)
        shell: powershell
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          if (!(Test-Path "$env:USERPROFILE\scoop")) {
              irm get.scoop.sh | iex
          }
              $env:PATH = "$env:USERPROFILE\scoop\shims;$env:USERPROFILE\scoop\apps\scoop\current\bin;" + $env:PATH
          .\installer.ps1


      - name: Execute Build Engine (.ps1)
        shell: powershell
        run: |
          $templates = @(
            "template\lab-report-template\main.tex"
            "template\paper-slides-template\main.tex"
            "template\ppt-template\main.tex"
          )

          foreach ($template in $templates) {
            Write-Host "::group::Building $template"
            .\ltx-build.ps1 -Template $template -Clean
            Write-Host "::endgroup::"
          }


      - name: Archive Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdf-assets-windows
          path: "**/*.pdf"
          if-no-files-found: error




  # ------------------------------------------
  # --- Task 3: Automated Delivery (GitHub Release) ---
  # ------------------------------------------
  release:
    needs: [build-linux, build-windows]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/          # Download to unified directory

      - name: Organize Release Files
        run: |
          mkdir -p release-assets
          find artifacts/ -name "*.pdf" | while read -r file; do
            platform_full=$(echo "$file" | cut -d'/' -f2)
            platform=${platform_full#pdf-assets-}

            template=$(basename $(dirname "$file"))
            cp "$file" "release-assets/${template}-${platform}.pdf"
          done
          COUNT=$(ls release-assets/ | wc -l)
          echo "Total assets PDF files collected: $COUNT"
          ls -lh release-assets/
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No PDF files were generated. Aborting release."
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "LaTeX Release ${{ github.ref_name }}"
          body: |
            ## 📄 Compiled LaTeX Documents

            This release contains PDFs built across Linux and Windows environments.
          files: "release-assets/*.pdf"
          generate_release_notes: true
          fail_on_unmatched_files: true